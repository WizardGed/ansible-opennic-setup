name: CI

on:
  push:
    branches: [ master, fixci ]
  pull_request:
    branches: [ master, fixci ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ansible and collections
        run: |
          pip install ansible
          ansible-galaxy collection install -r collections.yml
      - name: Run ansible-lint
        uses: ansible/ansible-lint@main
        with:
          args: "site.yml roles/"

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - role: coredns
            working_dir: .
            scenario: coredns
          - role: bind
            working_dir: roles/bind
            scenario: default
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install molecule molecule-podman ansible
          ansible-galaxy collection install -r collections.yml
      - name: Run Molecule tests
        working-directory: ${{ github.workspace }}/${{ matrix.working_dir }}
        env:
          ANSIBLE_ROLES_PATH: ${{ github.workspace }}/roles
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible.cfg
          ANSIBLE_REMOTE_TMP: /tmp/.ansible/tmp
        run: |
          molecule test -s ${{ matrix.scenario }}