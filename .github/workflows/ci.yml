
name: CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ master, fixci ]
  pull_request:
    branches: [ master, fixci ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ansible and collections
        run: |
          pip install ansible
          ansible-galaxy collection install -r collections.yml
      - name: Run ansible-lint
        uses: ansible/ansible-lint@main
        with:
          args: "site.yml roles/"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - role: coredns
            path: molecule/coredns
            scenario: coredns
          - role: bind
            path: roles/bind/molecule/default
            scenario: default
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install molecule molecule-podman ansible
          ansible-galaxy collection install -r collections.yml
      - name: Run Molecule tests
        working-directory: ${{ matrix.path }}
        env:
          ANSIBLE_ROLES_PATH: ${{ github.workspace }}/roles
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible.cfg
          ANSIBLE_REMOTE_TMP: /tmp/.ansible/tmp
        run: |
          molecule create -s ${{ matrix.scenario }}
          molecule converge -s ${{ matrix.scenario }}
          molecule idempotence -s ${{ matrix.scenario }}
          molecule verify -s ${{ matrix.scenario }}
          molecule destroy -s ${{ matrix.scenario }}
        # Uses collections.yml for dependency management and ansible_facts for OS detection