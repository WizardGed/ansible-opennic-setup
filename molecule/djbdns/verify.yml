---
- name: Verify
  hosts: all
  tasks:
    - name: Ensure dig is installed
      ansible.builtin.package:
        name: "{{ 'dnsutils' if ansible_facts['os_family'] == 'Debian' else 'bind-utils' }}"
        state: present
      when: ansible_facts['os_family'] in ['Debian', 'RedHat']

    - name: Check if systemd is running
      ansible.builtin.stat:
        path: /run/systemd/system
      register: djbdns_systemd_running

    - name: Check dnscache service
      ansible.builtin.service:
        name: dnscache
        state: started
      register: djbdns_service_status
      when:
        - ansible_facts['service_mgr'] == 'systemd'
        - djbdns_systemd_running.stat.exists

    - name: Assert dnscache is running
      ansible.builtin.assert:
        that: djbdns_service_status.state == 'started'
      when:
        - ansible_facts['service_mgr'] == 'systemd'
        - djbdns_systemd_running.stat.exists

    - name: Check DNS resolution
      ansible.builtin.command: dig @localhost www.opennic.org
      register: djbdns_dig_result
      failed_when: djbdns_dig_result.rc != 0
      changed_when: false
      when:
        - ansible_facts['service_mgr'] == 'systemd'
        - djbdns_systemd_running.stat.exists

    - name: Assert DNS works
      ansible.builtin.assert:
        that: djbdns_dig_result.rc == 0
      when:
        - ansible_facts['service_mgr'] == 'systemd'
        - djbdns_systemd_running.stat.exists
