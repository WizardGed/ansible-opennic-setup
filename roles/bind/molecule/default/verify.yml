---
- name: Verify
  hosts: all
  tasks:
    - name: Check BIND service
      ansible.builtin.service:
        name: "{{ 'bind9' if ansible_os_family == 'Debian' else 'named' }}"
        state: started
      register: service_status

    - name: Assert service is running
      ansible.builtin.assert:
        that: service_status.state == 'started'

    - name: Check DNS resolution
      ansible.builtin.command: dig @localhost www.opennic.org
      register: dig_result
      failed_when: dig_result.rc != 0

    - name: Assert DNS works
      ansible.builtin.assert:
        that: dig_result.rc == 0