- name: Update apt cache (Debian/Ubuntu)
  ansible.builtin.apt:
    update_cache: true
  when: ansible_facts["os_family"] == 'Debian'

- name: Install BIND
  ansible.builtin.package:
    name: "{{ bind_package }}"
    state: present

- name: Enable and start BIND service
  ansible.builtin.systemd:
    name: "{{ bind_service }}"
    state: started
    enabled: true
  when: molecule_yml is not defined

- name: Create BIND config directory if needed
  ansible.builtin.file:
    path: "{{ bind_config_dir }}"
    state: directory
    owner: "{{ bind_user }}"
    group: "{{ bind_group }}"
    mode: "0755"

- name: Deploy BIND main config (Debian)
  ansible.builtin.template:
    src: named.conf.debian.j2
    dest: "{{ bind_main_config }}"
    backup: true
    owner: "{{ bind_user }}"
    group: "{{ bind_group }}"
    mode: "0644"
  when: ansible_facts["os_family"] == 'Debian'
  notify: Restart bind

- name: Deploy BIND main config (RedHat)
  ansible.builtin.template:
    src: named.conf.redhat.j2
    dest: "{{ bind_main_config }}"
    backup: true
    owner: "{{ bind_user }}"
    group: "{{ bind_group }}"
    mode: "0644"
  when: ansible_facts["os_family"] == 'RedHat'
  notify: Restart bind

- name: Deploy OpenNIC zones config
  ansible.builtin.template:
    src: named.conf.opennic.j2
    dest: "{{ bind_opennic_config }}"
    backup: true
    owner: "{{ bind_user }}"
    group: "{{ bind_group }}"
    mode: "0644"
  notify: Restart bind

- name: Set SELinux booleans for BIND (RedHat family)
  ansible.posix.setsebool:
    name: "{{ item }}"
    state: true
    persistent: true
  loop:
    - named_tcp_bind_http_port
    - named_write_master_zones
  when: ansible_facts["os_family"] == 'RedHat'
