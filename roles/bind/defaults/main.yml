---
bind_package: "{{ 'bind9' if ansible_os_family == 'Debian' else 'bind' }}"
bind_service: "{{ 'bind9' if ansible_os_family == 'Debian' else 'named' }}"
bind_user: "{{ 'bind' if ansible_os_family == 'Debian' else 'named' }}"
bind_group: "{{ 'bind' if ansible_os_family == 'Debian' else 'named' }}"
bind_config_dir: "{{ '/etc/bind' if ansible_os_family == 'Debian' else '/var/named' }}"
bind_main_config: "{{ '/etc/bind/named.conf.options' if ansible_os_family == 'Debian' else '/etc/named.conf' }}"
bind_opennic_config: "{{ '/etc/bind/named.conf.default-zones' if ansible_os_family == 'Debian' else '/var/named/named.conf.opennic' }}"

# OpenNIC master NS servers (update as needed)
opennic_masters:
  - 161.97.219.84
  - 2001:470:4212:10:0:100:53:10
  - 163.172.168.171
  - 94.103.153.176
  - 2a02:990:219:1:ba:1337:cafe:3
  - 207.192.71.13
  - 178.63.116.152
  - 2a01:4f8:141:4281::999
  - 188.226.146.136
  - 2001:470:1f04:ebf::2
  - 79.124.7.81
  - 144.76.103.143
  - 2a01:4f8:192:43a5::2

# DNSSEC settings
dnssec_validation: auto
dnssec_enable: true

# Advanced features
enable_doh: false
enable_dot: false
enable_dnssec_signing: false
enable_rate_limiting: false
enable_query_logging: false
minimal_logging: false

# DoT settings
dot_port: 853
dot_certificate: "/etc/ssl/certs/ssl-cert-snakeoil.pem"
dot_key: "/etc/ssl/private/ssl-cert-snakeoil.key"

# Rate limiting
rate_limit_requests: 10
rate_limit_window: 5

# Logging
log_queries: false
log_file: "/var/log/named/queries.log"
