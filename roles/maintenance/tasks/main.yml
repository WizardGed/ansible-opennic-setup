- name: Set DNS service name
  ansible.builtin.set_fact:
    maintenance_dns_service_name: "{{ 'dnscache' if dns_server == 'djbdns' else 'trust-dns' if dns_server == 'trust_dns' else bind_service }}"

- name: Backup BIND configs
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}.backup"
    remote_src: true
    mode: "0644"
  loop:
    - src: "{{ bind_main_config }}"
      dest: "{{ bind_main_config }}"
    - src: "{{ bind_opennic_config }}"
      dest: "{{ bind_opennic_config }}"
  when: dns_server == 'bind'

- name: Backup djbdns configs
  ansible.builtin.copy:
    src: /etc/dnscache/root/servers/@
    dest: /etc/dnscache/root/servers/@.backup
    remote_src: true
    mode: "0644"
  when: dns_server == 'djbdns'

- name: Backup trust-dns configs
  ansible.builtin.copy:
    src: /etc/trust-dns/server.toml
    dest: /etc/trust-dns/server.toml.backup
    remote_src: true
    mode: "0644"
  when: dns_server == 'trust_dns'

- name: Update OS packages
  ansible.builtin.package:
    name: '*'
    state: present

- name: Restart DNS service
  ansible.builtin.systemd:
    name: "{{ maintenance_dns_service_name }}"
    state: restarted
  when: dns_server in ['bind', 'djbdns', 'trust_dns']

- name: Rotate logs
  ansible.builtin.command: logrotate -f /etc/logrotate.conf
  changed_when: false
  when: ansible_os_family == 'Debian'

- name: Health check - test DNS resolution
  ansible.builtin.command: dig @localhost www.opennic.org
  register: maintenance_dns_check
  changed_when: false
  failed_when: maintenance_dns_check.rc != 0
  when: dns_server in ['bind', 'djbdns', 'trust_dns']

- name: Display DNS check result
  ansible.builtin.debug:
    msg: "DNS health check: {{ 'PASSED' if maintenance_dns_check.rc == 0 else 'FAILED' }}"
#  tasks file for maintenance
